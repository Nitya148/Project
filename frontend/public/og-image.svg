<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFBF7"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grain dots -->
  <g fill="#C85A40" opacity="0.06">
    <circle cx="1080" cy="80" r="3"/>
    <circle cx="1120" cy="160" r="2"/>
    <circle cx="1050" cy="220" r="2"/>
    <circle cx="80" cy="500" r="3"/>
    <circle cx="160" cy="560" r="2"/>
  </g>

  <!-- Logo block -->
  <g transform="translate(80, 80)">
    <circle cx="34" cy="34" r="34" fill="#C85A40"/>
    <text x="34" y="50" font-family="Georgia, serif" font-style="italic" font-weight="600" font-size="42" fill="#FDFBF7" text-anchor="middle">R</text>
    <text x="92" y="50" font-family="Georgia, serif" font-weight="500" font-size="40" fill="#2A1B24">Re<tspan font-style="italic" fill="#C85A40">Plate</tspan></text>
  </g>

  <!-- Hero text -->
  <text x="80" y="320" font-family="Georgia, serif" font-weight="500" font-size="100" fill="#2A1B24">Surplus food,</text>
  <text x="80" y="430" font-family="Georgia, serif" font-style="italic" font-weight="500" font-size="100" fill="#C85A40">redistributed.</text>

  <!-- Sub copy -->
  <text x="80" y="510" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="28" fill="#695A62">Real-time food rescue · neighborhood network</text>

  <!-- Stat strip -->
  <g transform="translate(80, 555)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="36" fill="#C85A40" font-weight="600">3,071</text>
    <text x="0" y="28" font-family="-apple-system, sans-serif" font-size="14" fill="#695A62" letter-spacing="2">MEALS RESCUED</text>

    <text x="240" y="0" font-family="Georgia, serif" font-size="36" fill="#2A1B24" font-weight="600">498.5</text>
    <text x="240" y="28" font-family="-apple-system, sans-serif" font-size="14" fill="#695A62" letter-spacing="2">KG FOOD SAVED</text>

    <text x="480" y="0" font-family="Georgia, serif" font-size="36" fill="#2A1B24" font-weight="600">2,035</text>
    <text x="480" y="28" font-family="-apple-system, sans-serif" font-size="14" fill="#695A62" letter-spacing="2">KG CO₂ AVOIDED</text>
  </g>
</svg>
